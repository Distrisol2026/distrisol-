const formatBRL = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(Number(v) || 0);
const formatDate = (d) => {
    if (!d)
        return '—';
    const dt = new Date(d + 'T00:00:00');
    if (isNaN(dt))
        return '—';
    return dt.toLocaleDateString('pt-BR');
};
const diasParaVencer = (d) => {
    if (!d)
        return 999;
    const hoje = new Date();
    hoje.setHours(0, 0, 0, 0);
    const venc = new Date(d + 'T00:00:00');
    return Math.round((venc - hoje) / 86400000);
};
const buildICSDataUri = (title, dateStr, notes) => {
    const dt = dateStr.replace(/-/g, '');
    const esc = (s) => String(s || '').replace(/\r?\n/g, ' ');
    const ics = [
        'BEGIN:VCALENDAR',
        'VERSION:2.0',
        'PRODID:-//Distrisol//App//PT',
        'BEGIN:VEVENT',
        'UID:' + dt + '-' + Math.random().toString(36).slice(2) + '@distrisol',
        'DTSTAMP:' + dt + 'T090000Z',
        'DTSTART;VALUE=DATE:' + dt,
        'DTEND;VALUE=DATE:' + dt,
        'SUMMARY:' + esc(title),
        notes ? 'DESCRIPTION:' + esc(notes) : '',
        'BEGIN:VALARM',
        'ACTION:DISPLAY',
        'DESCRIPTION:Lembrete',
        'TRIGGER:-P1D',
        'END:VALARM',
        'END:VEVENT',
        'END:VCALENDAR',
    ].filter(Boolean).join('\r\n');
    return 'data:text/calendar;charset=utf-8,' + encodeURIComponent(ics);
};
